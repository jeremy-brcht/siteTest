<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="utf-8">

		<link rel="stylesheet" type="text/css" href="./asset/css/style-bon-plan.css">

	<body>
		<header>
			<div id="div-logo">
				<a href="./index.html"><img alt="" src="./asset/icons/dessin.svg" id="logo"/></a>
			</div>
			<div id="barre">
				<button type="button" class="btn btn-dark bouton-barre" onclick="location.href = './produit.html';">

					Produits
				</button>
				<button type="button" class="btn btn-dark bouton-barre" id="bon-plan" onclick="location.href = './bon-plan.html';">
					<img alt="" src="./asset/icons/discount.svg" class="img-barre"/><br>

				<button type="button" class="btn btn-dark bouton-barre" onclick="location.href = './panier.html';">

				<form id="form-search" action="./search.html" method="POST">

			<p id="titre">Pour noël, voici les offres que l'on vous propose !</p>
			<div class="produit bordure">
				<a href="./pages-produits/airpods.html">
					<p> A l'occasion de Noël, les airpods sont à -25% !</p>
					<img src="./asset/img-bon-plan/airpods.gif" alt="Airpods -25%">
				</a>
			</div>
			<div class="produit bordure">
				<a href="./pages-produits/bose-qc-35-2.html">
					<p> Toujours pour Noël, le Bose QC 35 II passe en réduction à 50% !</p>
					<img src="./asset/img-bon-plan/bose-qc-35-2.gif" alt="Bose QC 35 II -50%">
				</a>
			</div>
			<div class="produit">
				<a href="./pages-produits/jbl-go-3.html">
					<p> L'enceinte JBL Go 3 est disponible avec 25% de reduction.</p>
					<img src="./asset/img-bon-plan/jbl-go-3.gif" alt="JBL Go 3 -25%">
