<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="utf-8">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
		<link rel="stylesheet" type="text/css" href="./asset/css/style-panier.css">
		<link rel="preconnect" href="https://fonts.gstatic.com">
		<link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Oswald&display=swap" rel="stylesheet">
		<title> Projet </title>
	</head>
	<body>
		<header>
			<div id="div-logo">
				<a href="./index.html"><img alt="" src="./asset/icons/dessin.svg" id="logo"/></a>
			</div>
			<div id="barre">
				<button type="button" class="btn btn-dark bouton-barre" onclick="location.href = './produit.html';">
					<img alt="" src="./asset/icons/speaker.svg" class="img-barre"/><br>
					Produits
				</button>
				<button type="button" class="btn btn-dark bouton-barre" id="bon-plan" onclick="location.href = './bon-plan.html';">
					<img alt="" src="./asset/icons/discount.svg" class="img-barre"/><br>
					Bons plans</button>
				<button type="button" class="btn btn-dark bouton-barre" onclick="location.href = './panier.html';">
					<img alt="" src="./asset/icons/panier.svg" class="img-barre"/><br>
					Panier
				</button>
				<button type="button" class="btn btn-dark bouton-barre" onclick="location.href = './a-propos.html';">
					<img alt="" src="./asset/icons/question.svg" class="img-barre"/><br>
					A propos
				</button>
				<form id="form-search" action="./search.html" method="POST">
					<input type="text" name="search" id="search" placeholder="Cherchez un produit">
					<button type="submit" id="btn-search"><img alt="" src="./asset/icons/loupe.svg" id="img-search"/></button>
				</form>
			</div>
		</header>
		<div id="corps">
			<p id="panier">Voici votre panier :</p>

			<div class="card" id="recapitulatif">
				<div class="card-body" id="padding-card">
					<h5 class="card-title">Récapitulatif</h5>
					<p class="card-text">Airpods Pro<br>279€<br><br>JBLClip 3<br>29,99€<br><br>Bose QC 35 II<br>124,99€<br><br>Total : 433,98€</p>
					<a href="./livraison.html" class="btn btn-primary" id="btn-valider">Valider</a>
				</div>
			</div>

			<div id="produit">
				<div class="card mb-3" id="presentation1">
					<div class="row no-gutters">
						<div class="col-md-4">
							<img src="./asset/img-produits/ecouteurs/airpods-pro.png" class="card-img" alt="Airpods Pro">
						</div>
						<div class="col-md-8">
							<div class="card-body">
								<h5 class="card-title">Airpods Pro</h5>
								<p class="card-text">279€</p>
								<button type="button" class="btn btn-dark btn-retirer">Retirer du panier</button>
							</div>
						</div>
					</div>
				</div>

				<div class="card mb-3" id="presentation2">
					<div class="row no-gutters">
						<div class="col-md-4">
							<img src="./asset/img-produits/petites-enceintes/jbl-clip-3.png" class="card-img" alt="JBL Clip 3">
						</div>
						<div class="col-md-8">
							<div class="card-body">
								<h5 class="card-title">JBL Clip 3</h5>
								<p class="card-text">29,99€</p>
								<button type="button" class="btn btn-dark btn-retirer">Retirer du panier</button>
							</div>
						</div>
					</div>
				</div>

				<div class="card mb-3" id="presentation3">
					<div class="row no-gutters">
						<div class="col-md-4">
							<img src="./asset/img-produits/casques-bluetooth/bose-qc-35-2.png" class="card-img" alt="Bose QC 35 II">
						</div>
						<div class="col-md-8">
							<div class="card-body">
								<h5 class="card-title">Bose QC 35 II</h5>
								<p class="card-text"><del class="promo">249,99</del><span class="promo">-50%</span>124,99€</p>
								<button type="button" class="btn btn-dark btn-retirer">Retirer du panier</button>
							</div>
						</div>
					</div>
				</div>
			</div>

		</div>
		<footer>
			<div>Icons made by :<br>
				<ul>
					<li><a href="https://www.flaticon.com/authors/monkik" title="monkik" target="_blank">monkik</a></li>
					<li><a href="https://www.flaticon.com/authors/freepik" title="Freepik">Freepik</a></li>
					<li><a href="https://www.flaticon.com/authors/becris" title="Becris">Becris</a></li>
				</ul>
				from <a href="https://www.flaticon.com/" title="Flaticon">www.flaticon.com</a>
			</div>
		</footer>
	</body>
</html>
