<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="utf-8">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
		<link rel="stylesheet" type="text/css" href="./asset/css/style-livraison.css">
		<link rel="preconnect" href="https://fonts.gstatic.com">
		<link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Oswald&display=swap" rel="stylesheet">
		<title> Projet </title>
	</head>
	<body>
		<header>
			<div id="div-logo">
				<a href="./index.html"><img alt="" src="./asset/icons/dessin.svg" id="logo"/></a>
			</div>
			<div id="barre">
				<button type="button" class="btn btn-dark bouton-barre" onclick="location.href = './produit.html';">
					<img alt="" src="./asset/icons/speaker.svg" class="img-barre"/><br>
					Produits
				</button>
				<button type="button" class="btn btn-dark bouton-barre" id="bon-plan" onclick="location.href = './bon-plan.html';">
					<img alt="" src="./asset/icons/discount.svg" class="img-barre"/><br>
					Bons plans</button>
				<button type="button" class="btn btn-dark bouton-barre" onclick="location.href = './panier.html';">
					<img alt="" src="./asset/icons/panier.svg" class="img-barre"/><br>
					Panier
				</button>
				<button type="button" class="btn btn-dark bouton-barre" onclick="location.href = './a-propos.html';">
					<img alt="" src="./asset/icons/question.svg" class="img-barre"/><br>
					A propos
				</button>
				<form id="form-search" action="./search.html" method="POST">
					<input type="text" name="search" id="search" placeholder="Cherchez un produit">
					<button type="submit" id="btn-search"><img alt="" src="./asset/icons/loupe.svg" id="img-search"/></button>
				</form>
			</div>
		</header>
		<div id="corps">

			<p id="titre">Entrez vos coordonées de livraison</p> 
			<form id="form">
				<input type="text" name="nom" id="nom" placeholder="Nom" required>
				<input type="text" name="prenom" id="prenom" placeholder="Prénom" required>
				<input type="text" name="telephone" id="telephone" placeholder="Téléphone" required>
				<input type="text" name="adresse" id="adresse" placeholder="Adresse" required>
				<input type="text" name="ville" id="ville" placeholder="Ville" required>
				<input type="text" name="code-postal" id="code-postal" placeholder="Code postal" required>
				<button type="submit" id="submit" class="btn btn-primary">Valider</button>
			</form>





		</div>
		<footer>
			
			<div>Icons made by :<br>
				<ul>
					<li><a href="https://www.flaticon.com/authors/monkik" title="monkik" target="_blank">monkik</a></li>
					<li><a href="https://www.flaticon.com/authors/freepik" title="Freepik">Freepik</a></li>
					<li><a href="https://www.flaticon.com/authors/becris" title="Becris">Becris</a></li>
				</ul>
				from <a href="https://www.flaticon.com/" title="Flaticon">www.flaticon.com</a>
			</div>

		</footer>
	</body>
</html>
